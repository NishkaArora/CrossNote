app            = "crossnote-labeler"
primary_region = "sjc"

[env]
  PORT                      = "8080"
  NODE_ENV                  = "production"
  DATABASE_URL              = "file:/data/labeler.db"
  NOTES_PATH                = "/data/cn_crh_notes.tsv"
  BM25_CUTOFF               = "0.78"
  SENTENCE_TRANSFORMERS_HOME = "/data/model_cache"

[mounts]
  source      = "crossnote_data"
  destination = "/data"

[[services]]
  protocol      = "tcp"
  internal_port = 8080

  [[services.ports]]
    port        = 80
    handlers    = ["http"]
    force_https = true

  [[services.ports]]
    port     = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval     = "30s"
    timeout      = "10s"
    grace_period = "360s"   # models + embeddings take 2-5 min on first run
    method       = "GET"
    path         = "/"

[vm]
  memory   = "2gb"
  cpu_kind = "shared"
  cpus     = 1

# Required secrets (fly secrets set KEY=value):
#   LABELER_DID            — DID of crossnote.bsky.social
#   LABELER_SIGNING_KEY    — hex signing key from @skyware/labeler setup
#   BSKY_HANDLE            — crossnote.bsky.social
#   BSKY_PASSWORD          — app password
#   OPENAI_API_KEY         — for future Stage 3 LLM evaluation
